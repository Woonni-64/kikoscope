<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四级考试刷题工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>四级考试刷题工具</h1>
            <p>提升你的英语水平，为四级考试做好准备</p>
        </header>

        <main class="main-content">
            <div class="welcome-section">
                <div class="exam-info">
                    <h2>考试说明</h2>
                    <div class="info-grid">
                        <div class="info-item">
                            <h3>选词填空</h3>
                            <p>1道题</p>
                        </div>
                        <div class="info-item">
                            <h3>段落匹配</h3>
                            <p>1道题</p>
                        </div>
                        <div class="info-item">
                            <h3>仔细阅读</h3>
                            <p>1道题</p>
                        </div>
                        <div class="info-item">
                            <h3>翻译</h3>
                            <p>1道题</p>
                        </div>
                        <div class="info-item">
                            <h3>写作</h3>
                            <p>1道题</p>
                        </div>
                    </div>
                </div>

                <div class="features">
                    <h2>特色功能</h2>
                    <ul>
                        <li>✅ 随机从5套题目中抽取，确保题目多样性</li>
                        <li>✅ 选择题选项自动打乱，避免记忆答案</li>
                        <li>✅ 模拟真实四级考试格式</li>
                        <li>✅ 即时反馈和成绩分析</li>
                        <li>✅ 支持多次练习，持续提升</li>
                    </ul>
                </div>

                <div class="start-section">
                    <button id="startExam" class="btn btn-primary">开始考试</button>
                    <p class="note">每次考试题目都会随机生成，确保练习效果</p>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 四级考试刷题工具. 持续学习，持续进步！</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
